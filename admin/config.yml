# Use DecapBridge PKCE auth.
backend:
  name: git-gateway
  repo: marco66colombo/fastmachinelearning.github.io
  branch: master
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/c4d28def-6a4d-4523-bffb-d00e5b023439/pkce
  auth_token_endpoint: /sites/c4d28def-6a4d-4523-bffb-d00e5b023439/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://marco66colombo.github.io/fastmachinelearning.github.io

local_backend: true

media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: applications
    label: Applications
    label_singular: Application
    folder: _applications
    create: true
    slug: "{{slug}}"
    media_folder: /images/applications
    public_folder: /images/applications
    editor:
      preview: false
    fields:
      - { label: Layout, name: layout, widget: hidden, default: gallery-item }
      - { label: Title, name: title, widget: string, required: true }
      - { label: Summary, name: summary, widget: text, required: true }
      - { label: Submitter, name: submitter, widget: string, required: true }
      - { label: Domain, name: domain, widget: string, required: true }
      - { label: Main Image, name: image, widget: image, required: false }
      - { label: Image Alt Text, name: image_alt, widget: string, required: false }
      - { label: Affiliation, name: affiliation, widget: string, required: false }
      - label: Tools Used
        name: tools_used
        widget: list
        required: false
        field: { label: Tool, name: tool, widget: string }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - label: Links
        name: links
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
      - label: Review Status
        name: review_status
        widget: select
        required: false
        default: draft
        options:
          - draft
          - approved
      - { label: Body, name: body, widget: markdown, required: false }

  - name: tools
    label: Tools
    label_singular: Tool
    folder: _tools
    create: true
    slug: "{{slug}}"
    media_folder: /images/tools
    public_folder: /images/tools
    editor:
      preview: false
    fields:
      - { label: Layout, name: layout, widget: hidden, default: gallery-item }
      - { label: Title, name: title, widget: string, required: true }
      - { label: Summary, name: summary, widget: text, required: true }
      - { label: Submitter, name: submitter, widget: string, required: true }
      - { label: Domain, name: domain, widget: string, required: true }
      - { label: Main Image, name: image, widget: image, required: false }
      - { label: Image Alt Text, name: image_alt, widget: string, required: false }
      - { label: Affiliation, name: affiliation, widget: string, required: false }
      - label: Tools Used
        name: tools_used
        widget: list
        required: false
        field: { label: Tool, name: tool, widget: string }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - label: Links
        name: links
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
      - label: Review Status
        name: review_status
        widget: select
        required: false
        default: draft
        options:
          - draft
          - approved
      - { label: Body, name: body, widget: markdown, required: false }

  - name: news
    label: News
    label_singular: News Item
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    media_folder: /images
    public_folder: /images
    editor:
      preview: false
    fields:
      - { label: Layout, name: layout, widget: hidden, default: post }
      - { label: Title, name: title, widget: string, required: true }
      - { label: Description, name: description, widget: text, required: true }
      - { label: External Link, name: external_link, widget: string, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown, required: false }
